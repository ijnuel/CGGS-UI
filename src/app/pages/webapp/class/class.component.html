<div class="p-6">
  <div class="flex justify-between items-center mb-4">
    <h3 class="text-xl font-semibold">Classes</h3>
    <div class="flex gap-2">
      <button mat-raised-button color="primary" (click)="onRefresh()" class="flex items-center">
        <mat-icon>refresh</mat-icon>
        <span>Refresh</span>
      </button>
    </div>
  </div>

  <app-table
    [tableData]="(classList$ | async)?.data ?? []"
    [tableHeaderData]="tableHeaderData"
    [isLoading]="(loading$ | async) ?? false"
    [totalLength]="(classList$ | async)?.totalCount ?? 0"
    [showSearch]="false"
    [showFilters]="true"
    [showActionColumn]="true"
    [showEditIcon]="false"
    [showDeleteIcon]="false"
    (queryChange)="onQueryChange($event)"
    (view)="onView($event)"
    (edit)="onEdit($event)"
    (delete)="onDelete($event)"
  ></app-table>
</div>
