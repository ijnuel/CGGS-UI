<div class="pl-8 pr-9 pt-6" *ngIf="!(loading$ | async); else skeleton">
  <ng-container *ngIf="(item$ | async) as item">
    <div class="flex items-center justify-between mb-6">
      <h3 class="text-xl font-bold">Core Value Details</h3>
      <div class="flex gap-3">
        <button class="cancel-btn" (click)="goBack()">Back</button>
        <button class="sec-btn" (click)="navigateToEdit()">Edit</button>
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-6">
      <h4 class="font-semibold text-gray-700 mb-4 border-b pb-2">Details</h4>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <p class="text-xs text-gray-400 font-semibold uppercase tracking-wide mb-1">Title</p>
          <p class="text-gray-700 font-medium">{{ item.title }}</p>
        </div>
        <div>
          <p class="text-xs text-gray-400 font-semibold uppercase tracking-wide mb-1">Icon</p>
          <div class="flex items-center gap-2">
            <span *ngIf="item.iconName" class="material-icons text-[var(--app-accent)] text-2xl">{{ item.iconName }}</span>
            <p class="text-gray-500 text-sm">{{ item.iconName || '—' }}</p>
          </div>
        </div>
        <div>
          <p class="text-xs text-gray-400 font-semibold uppercase tracking-wide mb-1">Display Order</p>
          <p class="text-gray-700">{{ item.displayOrder ?? 0 }}</p>
        </div>
        <div>
          <p class="text-xs text-gray-400 font-semibold uppercase tracking-wide mb-1">Status</p>
          <span [class]="item.isActive ? 'text-green-600 font-semibold' : 'text-gray-400'">
            {{ item.isActive ? 'Active' : 'Inactive' }}
          </span>
        </div>
        <div class="col-span-2">
          <p class="text-xs text-gray-400 font-semibold uppercase tracking-wide mb-2">Body</p>
          <div class="prose prose-sm max-w-none text-gray-700 border border-gray-100 rounded-lg p-4 bg-gray-50"
               [innerHTML]="item.body"></div>
        </div>
      </div>
    </div>
  </ng-container>
</div>

<ng-template #skeleton>
  <div class="pl-8 pr-9 pt-6">
    <div class="h-8 bg-gray-200 rounded w-48 mb-6 animate-pulse"></div>
    <div class="bg-white rounded-2xl p-6 space-y-4">
      <div class="h-4 bg-gray-200 rounded w-32 animate-pulse"></div>
      <div class="h-6 bg-gray-200 rounded w-1/2 animate-pulse"></div>
      <div class="h-24 bg-gray-200 rounded animate-pulse"></div>
    </div>
  </div>
</ng-template>
