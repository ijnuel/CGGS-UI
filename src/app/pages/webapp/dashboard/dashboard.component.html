<div class="p-6">

  <!-- Welcome Banner -->
  <ng-container *ngIf="currentUser$ | async as user">
    <div class="bg-gradient-to-r from-indigo-600 to-indigo-400 rounded-xl p-6 mb-8 text-white flex flex-col sm:flex-row sm:items-center justify-between gap-4">
      <div>
        <p class="text-indigo-100 text-sm mb-1">{{ today | date:'EEEE, d MMMM yyyy' }}</p>
        <h2 class="text-2xl font-bold">Welcome back, {{ user.firstName }} {{ user.lastName }}</h2>
        <p class="text-indigo-100 text-sm mt-1">{{ user.userTypeString }}</p>
      </div>
      <div class="w-16 h-16 rounded-full bg-white/20 flex items-center justify-center flex-shrink-0">
        <mat-icon class="text-white" style="font-size:36px;width:36px;height:36px;">person</mat-icon>
      </div>
    </div>
  </ng-container>

  <!-- Stats Grid -->
  <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4 mb-8">
    <a *ngFor="let stat of stats"
       [routerLink]="stat.route"
       class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 flex flex-col gap-3 hover:shadow-md transition-shadow cursor-pointer no-underline">
      <div class="flex items-center justify-between">
        <div class="w-10 h-10 rounded-lg flex items-center justify-center" [ngClass]="stat.bg">
          <mat-icon [ngClass]="stat.color">{{ stat.icon }}</mat-icon>
        </div>
        <mat-icon class="text-gray-300 text-base">arrow_forward</mat-icon>
      </div>
      <div>
        <ng-container *ngIf="stat.hideCount; else countDisplay">
          <p class="text-2xl font-bold text-gray-400">—</p>
        </ng-container>
        <ng-template #countDisplay>
          <ng-container *ngIf="(stat.count$ | async) !== null; else countSkeleton">
            <p class="text-2xl font-bold text-gray-800">{{ stat.count$ | async }}</p>
          </ng-container>
          <ng-template #countSkeleton>
            <div class="h-7 w-12 bg-gray-200 rounded animate-pulse mb-1"></div>
          </ng-template>
        </ng-template>
        <p class="text-sm text-gray-500 mt-0.5">{{ stat.label }}</p>
      </div>
    </a>
  </div>

  <!-- Quick Access -->
  <div>
    <h3 class="text-base font-semibold text-gray-700 mb-4">Quick Access</h3>
    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4">
      <a *ngFor="let link of quickLinks"
         [routerLink]="link.route"
         class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 flex items-center gap-3 hover:shadow-md hover:border-indigo-200 transition-all cursor-pointer no-underline group">
        <div class="w-10 h-10 rounded-lg bg-gray-50 group-hover:bg-indigo-50 flex items-center justify-center flex-shrink-0 transition-colors">
          <mat-icon class="text-gray-400 group-hover:text-indigo-500 transition-colors">{{ link.icon }}</mat-icon>
        </div>
        <div class="min-w-0">
          <p class="text-sm font-semibold text-gray-800 truncate">{{ link.label }}</p>
          <p class="text-xs text-gray-400 truncate">{{ link.description }}</p>
        </div>
      </a>
    </div>
  </div>

</div>
