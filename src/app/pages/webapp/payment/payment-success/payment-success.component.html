<div class="p-6 flex flex-col items-center justify-center min-h-64">
  <div *ngIf="verifying" class="flex flex-col items-center gap-4 text-gray-500">
    <mat-spinner diameter="48"></mat-spinner>
    <p class="text-lg font-medium">Verifying payment...</p>
  </div>

  <div *ngIf="!verifying && verified" class="flex flex-col items-center gap-4 text-center">
    <div class="w-20 h-20 rounded-full bg-green-100 flex items-center justify-center">
      <mat-icon class="!text-5xl !w-12 !h-12 text-green-500">check_circle</mat-icon>
    </div>
    <h3 class="text-2xl font-bold text-green-600">Payment Successful!</h3>
    <p class="text-gray-500 text-sm max-w-xs">Your payment has been received and your fee record has been updated.</p>
    <button mat-raised-button (click)="goToPayments()" style="background-color: var(--app-primary); color: white;">
      <mat-icon>receipt_long</mat-icon>
      View My Fees
    </button>
  </div>

  <div *ngIf="!verifying && error" class="flex flex-col items-center gap-4 text-center">
    <div class="w-20 h-20 rounded-full bg-red-100 flex items-center justify-center">
      <mat-icon class="!text-5xl !w-12 !h-12 text-red-500">error</mat-icon>
    </div>
    <h3 class="text-2xl font-bold text-red-600">Verification Failed</h3>
    <p class="text-gray-500 text-sm max-w-xs">We could not verify your payment. Please contact support if funds were deducted.</p>
    <button mat-raised-button (click)="goToPayments()" style="background-color: var(--app-primary); color: white;">
      <mat-icon>arrow_back</mat-icon>
      Back to Payments
    </button>
  </div>
</div>
