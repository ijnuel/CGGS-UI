<div class="pl-8 pr-9 pt-6" *ngIf="!(loading$ | async); else skeleton">
  <ng-container *ngIf="(item$ | async) as item">
    <div class="flex items-center justify-between mb-6">
      <h3 class="text-xl font-bold">Gallery Image Details</h3>
      <div class="flex gap-3">
        <button class="cancel-btn" (click)="goBack()">Back</button>
        <button class="sec-btn" (click)="navigateToEdit()">Edit</button>
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-6">
      <h4 class="font-semibold text-gray-700 mb-4 border-b pb-2">Details</h4>
      <div class="grid grid-cols-2 gap-4">
        <div class="col-span-2">
          <p class="text-xs text-gray-400 font-semibold uppercase tracking-wide mb-2">Image</p>
          <img *ngIf="item.imageUrl" [src]="item.imageUrl" [alt]="item.caption || 'Gallery image'"
               class="max-h-64 rounded-xl border border-gray-200 object-contain" />
        </div>
        <div class="col-span-2">
          <p class="text-xs text-gray-400 font-semibold uppercase tracking-wide mb-1">Image URL</p>
          <p class="text-gray-700 break-all text-sm">{{ item.imageUrl }}</p>
        </div>
        <div>
          <p class="text-xs text-gray-400 font-semibold uppercase tracking-wide mb-1">Caption</p>
          <p class="text-gray-700">{{ item.caption || '—' }}</p>
        </div>
        <div>
          <p class="text-xs text-gray-400 font-semibold uppercase tracking-wide mb-1">Display Order</p>
          <p class="text-gray-700">{{ item.displayOrder ?? 0 }}</p>
        </div>
        <div>
          <p class="text-xs text-gray-400 font-semibold uppercase tracking-wide mb-1">Status</p>
          <span [class]="item.isActive ? 'text-green-600 font-semibold' : 'text-gray-400'">
            {{ item.isActive ? 'Active' : 'Inactive' }}
          </span>
        </div>
      </div>
    </div>
  </ng-container>
</div>

<ng-template #skeleton>
  <div class="pl-8 pr-9 pt-6">
    <div class="h-8 bg-gray-200 rounded w-48 mb-6 animate-pulse"></div>
    <div class="bg-white rounded-2xl p-6 space-y-4">
      <div class="h-64 bg-gray-200 rounded-xl animate-pulse"></div>
      <div class="h-4 bg-gray-200 rounded w-1/2 animate-pulse"></div>
    </div>
  </div>
</ng-template>
