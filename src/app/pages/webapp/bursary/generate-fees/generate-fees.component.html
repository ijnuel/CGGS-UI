<div>
  <div class="mb-4">
    <h4 class="text-lg font-semibold text-gray-700 mb-1">Generate Fees</h4>
    <p class="text-sm text-gray-500">Generate fees for all students in a class for a given term/session</p>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
    <h5 class="text-base font-medium text-gray-700 mb-4 flex items-center gap-2">
      <mat-icon class="text-teal-400">receipt_long</mat-icon>
      Select Term &amp; Class
    </h5>
    <form [formGroup]="form">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-2">
        <div>
          <mat-form-field class="form-input w-full">
            <mat-label>Term / Session</mat-label>
            <mat-select [formControl]="form.controls.schoolTermSessionId">
              <mat-option *ngFor="let ts of schoolTermSessionAll$ | async" [value]="ts.id">
                {{ getTermLabel(ts) }}
              </mat-option>
            </mat-select>
            <mat-error>{{ getErrorMessage('schoolTermSessionId') }}</mat-error>
          </mat-form-field>
        </div>
        <div>
          <mat-form-field class="form-input w-full">
            <mat-label>Class</mat-label>
            <mat-select [formControl]="form.controls.classId">
              <mat-option *ngFor="let c of classList$ | async" [value]="c.id">{{ getClassLabel(c) }}</mat-option>
            </mat-select>
            <mat-error>{{ getErrorMessage('classId') }}</mat-error>
          </mat-form-field>
        </div>
      </div>
    </form>
    <div class="flex justify-end mt-4">
      <button class="sec-btn flex items-center gap-2" (click)="generate()" [disabled]="generating$ | async">
        <mat-spinner *ngIf="generating$ | async" diameter="16" class="!mr-1"></mat-spinner>
        <mat-icon *ngIf="!(generating$ | async)">bolt</mat-icon>
        Generate Fees
      </button>
    </div>
  </div>
</div>
