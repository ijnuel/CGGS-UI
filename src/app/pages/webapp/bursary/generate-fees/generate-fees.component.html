<div class="pl-8 pr-9 pt-6">
  <div class="flex items-center gap-3 mb-6">
    <button mat-icon-button routerLink="/app/bursary" style="color: var(--app-primary);">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <div>
      <h3 class="text-xl font-bold" style="color: var(--app-primary)">Generate Fees</h3>
      <p class="text-sm text-gray-500">Generate fees for all students in a class for a given term/session</p>
    </div>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
    <h5 class="text-base font-medium text-gray-700 mb-4 flex items-center gap-2">
      <mat-icon class="text-teal-400">receipt_long</mat-icon>
      Select Term &amp; Class
    </h5>
    <form [formGroup]="form">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-2">
        <div>
          <app-searchable-mat-select
            label="Term / Session"
            [options]="allTermSessions"
            [labelFn]="getTermLabel"
            valueKey="id"
            formInputClass="form-input w-full"
            [formControl]="form.controls.schoolTermSessionId"
          ></app-searchable-mat-select>
          <mat-error *ngIf="form.controls.schoolTermSessionId.touched && form.controls.schoolTermSessionId.invalid" class="text-xs">
            {{ getErrorMessage('schoolTermSessionId') }}
          </mat-error>
        </div>
        <div>
          <app-searchable-mat-select
            label="Class"
            [options]="allClasses"
            [labelFn]="getClassLabelFn"
            valueKey="id"
            formInputClass="form-input w-full"
            [formControl]="form.controls.classId"
          ></app-searchable-mat-select>
          <mat-error *ngIf="form.controls.classId.touched && form.controls.classId.invalid" class="text-xs">
            {{ getErrorMessage('classId') }}
          </mat-error>
        </div>
      </div>
    </form>
    <div class="flex justify-end mt-4">
      <button class="sec-btn flex items-center gap-2" (click)="generate()" [disabled]="generating$ | async">
        <mat-spinner *ngIf="generating$ | async" diameter="16" class="!mr-1"></mat-spinner>
        <mat-icon *ngIf="!(generating$ | async)">bolt</mat-icon>
        Generate Fees
      </button>
    </div>
  </div>
</div>
