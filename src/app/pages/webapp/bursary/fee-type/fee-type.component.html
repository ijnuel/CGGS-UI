<div class="pl-8 pr-9 pt-6">
  <div class="flex items-center gap-3 mb-6">
    <button mat-icon-button routerLink="/app/bursary" style="color: var(--app-primary);">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <div>
      <h3 class="text-xl font-bold" style="color: var(--app-primary)">Fee Types</h3>
      <p class="text-sm text-gray-500">Manage fee type categories</p>
    </div>
  </div>

  <div class="flex justify-end gap-2 mb-4">
    <button mat-raised-button color="primary" (click)="onRefresh()">
      <mat-icon>refresh</mat-icon> Refresh
    </button>
    <button mat-raised-button (click)="openCreate()" style="background-color: var(--app-button-bg); color: white;">
      <mat-icon>add</mat-icon> Create New
    </button>
  </div>

  <app-table
    [tableData]="(feeTypeList$ | async)?.data ?? []"
    [tableHeaderData]="tableHeaderData"
    [isLoading]="(loading$ | async) ?? false"
    [totalLength]="(feeTypeList$ | async)?.totalCount ?? 0"
    [showSearch]="true"
    [showFilters]="true"
    [showActionColumn]="true"
    [showViewIcon]="false"
    [showDeleteIcon]="false"
    (queryChange)="onQueryChange($event)"
    (edit)="onEdit($event)"
  ></app-table>
</div>
