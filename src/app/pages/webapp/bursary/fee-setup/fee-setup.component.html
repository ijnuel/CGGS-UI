<div>
  <div class="flex justify-between items-center mb-4">
    <h4 class="text-lg font-semibold text-gray-700">Fee Setup</h4>
    <div class="flex gap-2">
      <button mat-raised-button color="primary" (click)="onRefresh()">
        <mat-icon>refresh</mat-icon> Refresh
      </button>
      <button mat-raised-button [routerLink]="['../fee-setup/create']" style="background-color: var(--app-button-bg); color: white;">
        <mat-icon>add</mat-icon> Create New
      </button>
    </div>
  </div>

  <!-- Term Session Filter -->
  <div class="mb-4">
    <mat-form-field appearance="outline" class="w-full md:w-72" subscriptSizing="dynamic">
      <mat-label>Filter by Term / Session</mat-label>
      <mat-icon matPrefix class="mr-1 text-gray-400">filter_list</mat-icon>
      <mat-select
        [value]="selectedTermSessionId"
        (selectionChange)="onTermSessionChange($event.value)"
      >
        <mat-option value="">All Terms</mat-option>
        <mat-option *ngFor="let ts of schoolTermSessionAll$ | async" [value]="ts.id">
          {{ getTermLabel(ts) }}
        </mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <app-table
    [tableData]="(feeSetupList$ | async)?.data ?? []"
    [tableHeaderData]="tableHeaderData"
    [isLoading]="(loading$ | async) ?? false"
    [totalLength]="(feeSetupList$ | async)?.totalCount ?? 0"
    [showSearch]="false"
    [showFilters]="false"
    [showActionColumn]="true"
    [showViewIcon]="false"
    [showDeleteIcon]="true"
    (queryChange)="onQueryChange($event)"
    (edit)="onEdit($event)"
    (delete)="onDelete($event)"
  ></app-table>

  <p class="text-xs text-gray-400 mt-2">
    <mat-icon class="!text-xs !w-3 !h-3 mr-1">info</mat-icon>
    Fee Setups marked as "In Use" cannot be deleted.
  </p>
</div>
