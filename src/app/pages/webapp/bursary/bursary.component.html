<div class="p-6">
  <div class="mb-6">
    <h3 class="text-2xl font-bold" style="color: var(--app-primary)">Bursary</h3>
    <p class="text-sm text-gray-500 mt-1">Manage fee types, fee setups and generate fees</p>
  </div>

  <!-- Tab Navigation -->
  <div class="flex gap-2 mb-6 border-b border-gray-200">
    <button
      *ngFor="let tab of tabs"
      (click)="navigate(tab.path)"
      class="flex items-center gap-2 px-4 py-2.5 text-sm font-medium border-b-2 transition-colors duration-200 -mb-px"
      [ngClass]="isActive(tab.path)
        ? 'border-[var(--app-primary)] text-[var(--app-primary)]'
        : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'"
    >
      <mat-icon class="!text-base !w-4 !h-4">{{ tab.icon }}</mat-icon>
      {{ tab.label }}
    </button>
  </div>

  <!-- Routed Content -->
  <router-outlet></router-outlet>
</div>
