<div class="pl-8 pr-9 pt-6">
  <div class="flex items-center gap-3 mb-6">
    <button mat-icon-button routerLink="/app/bursary" style="color: var(--app-primary);">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <div>
      <h3 class="text-xl font-bold" style="color: var(--app-primary)">Transactions</h3>
      <p class="text-sm text-gray-500">View all payment gateway transactions</p>
    </div>
  </div>

  <div class="flex justify-end mb-4">
    <button mat-raised-button color="primary" (click)="onRefresh()">
      <mat-icon>refresh</mat-icon> Refresh
    </button>
  </div>

  <app-table
    [tableData]="(transactionList$ | async)?.data ?? []"
    [tableHeaderData]="tableHeaderData"
    [isLoading]="(loading$ | async) ?? false"
    [totalLength]="(transactionList$ | async)?.totalCount ?? 0"
    [showSearch]="true"
    [showFilters]="false"
    [showActionColumn]="true"
    [showViewIcon]="true"
    [showEditIcon]="false"
    [showDeleteIcon]="false"
    (queryChange)="onQueryChange($event)"
    (view)="onView($event)"
  ></app-table>
</div>
