<div class="min-h-screen flex items-stretch">

  <!-- ===== LEFT PANEL – Branding ===== -->
  <div class="hidden sm:flex sm:w-[45%] lg:w-[50%] bg-[var(--app-primary)] flex-col justify-between p-10 lg:p-14 relative overflow-hidden">

    <!-- Decorative blobs -->
    <div class="auth-blob-1 absolute top-0 right-0 w-72 h-72 bg-[#006efe]/10 rounded-full -translate-y-1/2 translate-x-1/3 pointer-events-none"></div>
    <div class="auth-blob-2 absolute bottom-0 left-0 w-80 h-80 bg-[#006efe]/08 rounded-full translate-y-1/2 -translate-x-1/3 pointer-events-none"></div>
    <div class="auth-blob-3 absolute top-1/2 left-1/2 w-48 h-48 bg-white/03 rounded-full -translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>

    <!-- Logo & School Name -->
    <div class="relative z-10 flex items-center gap-3 cursor-pointer" routerLink="/home">
      <img src="assets/images/logo-white.png" class="w-12 h-12 object-contain" alt="CGGS Logo" />
      <div class="leading-tight">
        <p class="text-white font-bold text-base tracking-wide">Chosen Generation</p>
        <p class="text-[var(--app-secondary)]/60 text-xs tracking-widest uppercase">Schools Portal</p>
      </div>
    </div>

    <!-- Central Quote -->
    <div class="relative z-10 py-8">
      <div class="w-10 h-1 bg-[#006efe] mb-6 rounded-full"></div>
      <h2 class="text-white leading-snug mb-4">
        "Shaping minds,<br />building futures."
      </h2>
      <p class="text-[var(--app-secondary)]/60 text-sm leading-relaxed max-w-xs">
        The CGGS Portal connects every member of our school family — parents, students,
        teachers, and administrators — in one seamless experience.
      </p>
    </div>

    <!-- Mini Stats -->
    <div class="relative z-10 grid grid-cols-3 gap-4 pt-6 border-t border-white/10">
      <div class="text-center">
        <p class="text-white font-bold text-2xl">500+</p>
        <p class="text-[var(--app-secondary)]/50 text-xs mt-1">Students</p>
      </div>
      <div class="text-center border-x border-white/10">
        <p class="text-white font-bold text-2xl">20+</p>
        <p class="text-[var(--app-secondary)]/50 text-xs mt-1">Staff</p>
      </div>
      <div class="text-center">
        <p class="text-white font-bold text-2xl">5+</p>
        <p class="text-[var(--app-secondary)]/50 text-xs mt-1">Years</p>
      </div>
    </div>

  </div>

  <!-- ===== RIGHT PANEL – Form ===== -->
  <div class="flex-1 bg-[var(--app-bg)] flex items-start md:items-center justify-center p-6 md:p-12 pt-16 md:pt-12 overflow-y-auto">

    <!-- Mobile logo (visible only on small screens) -->
    <div class="absolute top-5 left-5 sm:hidden cursor-pointer" routerLink="/home">
      <img src="assets/images/logo.png" class="w-10 h-10 object-contain" alt="CGGS" />
    </div>

    <div class="w-full max-w-md">
      <router-outlet></router-outlet>
    </div>

  </div>

</div>

<!-- LOADING OVERLAY -->
@if((globalLoading$ | async)){
  <app-global-loading></app-global-loading>
}
